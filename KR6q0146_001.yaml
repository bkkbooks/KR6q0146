body:
  text: 曹溪退隱述有一物於此從本以來昭昭靈靈不曾生不曾滅名不得狀不得一物者何物古人頌云古佛未生前凝然一相圓釋迦猶未會迦葉豈能傳此一物之所以不曾生不曾滅名不得狀不得也六祖告衆云吾有一物無名無字諸人還識否神會禪師即出曰諸佛之本源神會之佛性此所以為六祖之孽子也懷讓禪師自嵩山來六祖問曰什麼物伊麼來師罔措至八年方自肯曰説似一物即不中此所以為六祖之嫡子也三教聖人從此句出誰是舉者惜取眉毛佛祖出世無風起浪佛祖者世尊迦葉也出世者大悲為體度衆生也然以一物觀之則人人面目本來圓成豈假他人添脂著粉也此出世之所以起波浪也虗空藏經云文字是魔業名相是魔業至於佛語亦是魔業是此意也此直舉本分佛祖無功能乾坤失色日月無光然法有多義人有多機不妨施設法者一物也人者衆生也法有不變隨緣之義人有頓悟漸修之機故不妨文字語言之施設也此所謂官不容針私通車馬者也衆生雖曰圓成生無慧目甘受輪轉故若非出世之金鎞誰刮無明之厚膜也至於越苦海而登樂岸者皆由大悲之恩也然則恆沙身命難報萬一也此廣舉新熏感佛祖深恩王登寶殿野老謳歌強立種種名字或心或佛或衆生不可守名而生解當躰便是動念即乖一物上強立三名字者教之不得已也不可守名生解者亦禪之不得已也一擡一搦旋立旋破皆法王法令之自在者也此結上起下論佛祖事躰各別久旱逢佳雨他鄉見故人世尊三處傳心者為禪旨一代所説者為教門故曰禪是佛心教是佛語三處者多子塔前分半座一也靈山會上舉拈花二也雙樹下槨示雙趺三也所謂迦葉別傳禪燈者此也一代者四十九年間所説五教也人天教一也小乘教二也大乘教三也頓教四也圓教五也所謂阿難流通教海者此也然則禪教之源者世尊也禪教之派者迦葉阿難也以無言至於無言者禪也以有言至於無言者教也乃至心是禪法也語是教法也則法雖一味見解則天地懸隔此辨禪教二途不得放過草裏橫身是故若人失之於口則拈花微笑皆是教迹得之於心則世間麁言細語皆是教外別傳禪旨法無名故言不及也法無相故心不及也擬之於口者失本心王也失本心王則世尊拈花迦葉微笑盡落陳言終是無物也得之於心者非但衒談善説法要至於燕語深談實相也是故寶積禪師聞哭聲踊悅身心寶壽禪師見諍拳開豁面目者以此也此明禪教深淺明珠在手弄去弄來吾有一言絶慮忘緣兀然無事坐春來草自青絶慮忘緣者得之於心也所謂間道人也於戲其為人也本來無緣本來無事飢來即食困來即眠緑水青山任意逍遙漁村酒肆自在安眠年代甲子總不知春來依舊草自青此別欲一念回光者將謂無人賴有一箇教門惟傳一心法禪門惟傳見性法心如鏡之體性如鏡之光性自清淨即時豁然還得本心此祕重得意一念重重山與水清白舊家風評曰心有二種一本源心二無明取相心也性有二種一本法性二性相相對性也故禪教者同迷守名生解或以淺為深或以深為淺遂為觀行大病故於此辨之然諸佛説經先分別諸法後説畢竟空祖師示句迹絶於意地理顯於心源諸佛為萬代依憑故理須委示祖師在即時度脫故意使玄通迹祖師言迹也意學者意地也胡亂指注臂不外曲諸佛説弓祖師説絃佛説無礙之法方皈一味拂此一味之迹方現祖師所示一心故云庭前柏樹子話龍藏所未有底説弓曲也説絃直也龍藏龍宮之藏經也僧問趙州如何是祖師西來意州答云庭前柏樹子此所謂格外禪旨也魚行水濁鳥飛毛落故學者先以如實言教委辨不變隨緣二義是自心之性相頓悟漸修兩門是自行之始終然後放下教義但將自心現前一念參詳禪旨則必有所得所謂出身活路上根大智不在此限中下根者不可躐等也教義者不變隨緣頓悟漸修有先有後禪法者一念中不變隨緣性相體用元是一時離即離非是即非即故宗師據法離言直指一念見性成佛耳放下教義者以此明歷歷時雲藏深谷深密密處日照晴空大抵學者須參活句莫參死句活句下薦得堪與佛祖為師死句下薦得自救不了此下特舉活句使自悟入要見臨濟須是鐵漢評曰話頭有句意二門參句者徑截門活句也沒心路沒語路無摸𢱢故也參意者圓頓門死句也有理路有語路有聞解思相故也凡本參公案上切心做工夫如雞抱卵如貓捕鼠如飢思食如渴思水如兒憶母必有透徹之期祖師公案有一千七百則如狗子無佛性庭前柏樹子麻三斤乾屎橛之流也雞之抱卵暖氣相續也貓之捕鼠心眼不動也至於飢思食渴思水兒憶母皆出於真心非做作底心故云切也參禪無此切心能透徹者無有是處參禪須具三要一有大信根二有大憤志三有大疑情苟闕其一如折足之鼎終成廢器佛云成佛者信為根本永嘉云修道者先須立志蒙山云參禪者不疑言句是為大病又云大疑之下必有大悟日用應緣處只舉狗子無佛性話舉來舉去疑來疑去覺得沒理路沒義路沒滋味心頭熱悶時便是當人放身命處亦是成佛作祖底基本也僧問趙州狗子還有佛性也無州云無此一字子宗門之一關亦是摧許多惡知惡覺底器仗亦是諸佛面目亦是諸祖骨髓也須透得此關然後佛祖可期也古人頌云趙州露刃劒寒霜光𦦨𦦨擬議問如何分身作兩段話頭不得舉起處承當不得思量卜度又不得將迷待悟就不可思量處思量心無所之如老鼠入牛角便見倒斷也又尋常計較安排底是識情隨生死遷流底是識情怕怖慞惶底是識情今人不知是病只管在裏許頭出頭沒話頭有十種病曰意根下卜度曰揚眉瞬目處挅根曰語路上作活計曰文字中引證曰舉起處承當曰揚在無事匣裏曰作有無會曰作真無會曰作道理會曰將迷待悟也離此十種病者但舉話時略抖擻精神只疑是箇甚麼此事如蚊子上鐵牛更不問如何若何下嘴不得處棄命一攢和身透入重結上意使參活句者不得退屈古云參禪須透祖師關妙悟要窮心路絶工夫如調絃之法緊緩得其中勤則近執著忘則落無明惶惶歷歷密密綿綿彈琴者曰緩急得中然後清音普矣工夫亦如此急則動血囊忘則入鬼窟不徐不疾妙在其中工夫到行不知行坐不知坐當此之時八萬四千魔軍在六根門頭伺候隨心生設心若不起爭如之何魔者樂生死之鬼名也八萬四千魔軍者乃衆生八萬四千煩惱也魔本無種修行失念者遂派其源也衆生順其境故順之道人逆其境故逆之故云道高魔盛也禪定中或見孝子而斫股或見豬子而把鼻者亦自心起見感此外魔也心若不起則種種伎倆翻為割水吹光也古云壁隙風動心隙魔侵起心是天魔不起心是陰魔或起或不起是煩惱魔然我正法中本無如是事大抵忘機是佛道分別是魔境然魔境夢事何勞辨詰工夫若打成一片則縱今生透不得眼光落地之時不為惡業所率業者無明也禪者般若也明暗不相敵理固然也大抵參禪者還知四恩深厚麼還知四大醜身念念衰朽麼還知人命在呼吸麼生來值遇佛祖麼及聞無上法生希有心麼不離僧堂守節麼不與鄰單雜話麼切忌鼓扇是非麼話頭十二時中明明不昧麼對人接話時無間斷麼見聞覺知時打成一片麼返觀自己捉敗佛祖麼今生決定續佛慧命麼起坐便宜時還思地獄苦麼此一報身定脫輪回麼當八風境心不動麼此是參禪人日用中點撿底道理古人云此身不向今生度更待何生度此身四恩者父母君師施主恩也四大醜身者父之精一滴母之血一滴者水大之濕也精為骨血為皮者地大之堅也精血一塊不腐不爛者火大之暖也鼻孔先成通出入息者風大之動也阿難曰欲氣粗濁腥臊交遘此所以醜身也念念衰朽者頭上光陰剎那不停面自皺而髮自白如云今既不如昔後當不如今此無常之體也然無常之鬼以殺為戲實念念可畏也呼者出息之火也吸者入息之風也人命寄托只在出入息也八風者順逆二境也地獄苦者人間六十劫泥犁一晝夜鑊湯爐炭劒樹刀山之苦口不可形言也人身難得甚於海中之針境於此愍而警之評曰上來法語如人飲水冷暖自知聰明不能敵業乾慧未免苦輪各須察念勿以自謾學語之輩説時似悟對境還迷所謂言行相違者也此結上自謾之意言行相違虗實可辨若欲敵生死須得這一念子𪹼地一破方了得生死𪹼打破漆桶聲以打破漆桶然後生死可敵也諸佛因地法行者只此而已然一念子𪹼地一破然後須訪明師決擇正眼此事極不容易須生慚愧始得道如大海轉入轉深慎勿得小為足悟後若不見人則醍醐上味翻成毒藥古德云只貴子眼正不貴汝行履處昔仰山答溈山問云涅槃經四十卷總是魔説此仰山之正眼也仰山又問行履處溈山答曰只貴子眼正云此所以先開正眼而後説行履也故云若欲修行先須頓悟願諸道者深信自心不自屈不自高此心平等本無凡聖然約人有迷悟凡聖也因師激發忽悟真我與佛無殊者頓也此所以不自屈如云本來無一物也因悟斷習轉凡成聖者漸也此所以不自高如云時時勤拂拭也屈者教學者病也高者禪學者病也教學者不信禪門有悟入之祕訣深滯權教別執真妄不修觀行數他珍寶故自生退屈也禪學者不信教門有修斷之正路染習雖起不生慚愧果級雖初多有法慢故發言過高也是故得意修心者不自屈不自高也評曰不自屈不自高者略舉初心因該果海則雖信之一位也廣舉菩薩果徹因源則五十五位也迷心修道但助無明悟若未徹修豈稱真哉悟修之義如膏明相賴目足相資修行之要但盡凡情別無聖解病盡藥除還是本人不用捨衆生心但莫染污自性求正法是邪捨者求者皆是染污也斷煩惱名二乘煩惱不生名大涅槃斷者能所也不生者無能所也須虗懷自照信一念緣起無生此單明性起諦觀殺盜淫妄從一心上起當處便寂何須更斷此雙明性相經云不起一念名為永斷無明又云念起即覺知幻即離不作方便離幻即覺亦無漸次心為幻師也身為幻城也世界幻衣也名相幻食也至於起心動念言妄言真無非幻也又無始幻無明皆從覺心生幻幻如空花幻滅名不動故夢瘡求醫者寤來無方便知幻者亦如是衆生於無生中妄見生死涅槃如見空花起滅性本無生故無生涅也空本無花故無起滅也見生死者如見空花起也見涅槃者如見空花滅也然起本無起滅本無滅於此二見不用窺詰是故思益經云諸佛出世非為度衆生只為度生死涅槃二見耳菩薩度衆生入滅度又實無衆生得滅度菩薩只以念念為衆生也了念體空者度衆生也念既空寂者實無衆生得滅度也此上論信解理雖頓悟事非頓除文殊達天真普賢明緣起解似電光行同窮子此下論修證帶淫修禪如蒸沙作飯帶殺修禪如塞耳呌聲帶偷修禪如漏巵求滿帶妄修禪如刻糞為香縱有多智皆成魔道此明修行軌則三無漏學也小乘稟法為戒粗治其末大乘攝心為戒細絶其本然則法戒無身犯心戒無思犯也淫者斷清淨殺者斷慈悲盜者斷福德妄者斷真實也能成智慧縱得六神通如不斷殺盜淫妄則必落魔道永失菩提正路矣此四戒百戒之根故別明之使無思犯也無憶曰戒無念曰定莫妄曰慧又戒為捉賊定為縛賊慧為殺賊又戒器完固定水澄清慧月方現此三學者實為萬法之源故特明之使無諸漏也靈山會上豈有無行佛少林門下豈有妄語祖無德之人不依佛戒不護三業放逸懈怠輕慢他人輕量是非而為根本一破心戒百過俱生評曰如此魔徒末法熾盛惱亂正法學者詳之若不持戒尚不得疥癩野干之身況清淨菩提果可冀乎重戒如佛佛常在焉須草繫鵝珠以為先導欲脫生死先斷貪欲及諸愛渴愛為輪回之本欲為受生之緣佛云淫心不除塵不可出又云恩愛一縛著率人入罪門渴者情愛之至切也無礙清淨慧皆因禪定生超凡入聖坐脫立亡者皆禪定之力也故云欲求聖道離此無路心在定則能知世間生滅諸相虗隙日光纖埃擾擾清潭水底影像昭昭見境心不起名不生不生名無念無念名解脫戒也定也慧也舉一具三不是單相修道證滅是亦非真也心法本寂乃真滅也故曰諸法從本來常自寂滅相眼不自見見眼者妄也故妙首思量淨名杜默此下散舉細行貧人來乞隨分施與同體大悲是真布施自他為一曰同體空手來空手去吾家活計有人來害當自攝心勿生嗔恨一念嗔心起百萬障門開煩惱雖無量嗔慢為甚涅槃云塗割兩無心嗔如冷雲中霹靂起火來若無忍行萬行不成行門雖無量慈忍為根源忍心如幻夢辱境若龜毛守本真心第一精進若起精進心是妄非精進故云莫妄想莫妄想懈怠者常常望後是自棄人也持呪者現業易制自行可違宿業難除必借神力摩登得果信不誣矣故不持神呪遠離魔事者無有是處禮拜者敬也伏也恭敬真性屈伏無明身口意清淨則佛出世念佛者在口曰誦在心曰念徒誦失念於道無益阿彌陀佛六字法門定出輪回之捷徑也心則緣佛境界憶持不忘口則稱佛名號分明不亂如是心口相應名曰念佛評曰五祖云守本真心勝念十方諸佛六祖云常念他佛不免生死守我本心即到彼岸又云佛向性中作莫向身外求又云迷人念佛求生悟人自淨其心又云大抵衆生悟心自度佛不能度衆生云云如上諸德直指本心別無方便方將一法便逗諸根理實如是然迹門實有極樂世界阿彌陀佛有四十八大願凡念十聲者承此願力往生蓮胎徑脫輪回三世諸佛異口同音十方菩薩同願往生又況古今往生之人傳記昭昭願諸行者慎勿錯認勉之勉之梵語阿彌陀此云無量壽亦云無量光十方三世第一佛號也因名法藏比丘對世自在王佛發四十八願云我作佛時十方無央數世界諸天人民以至蜎飛蠕動之流念我名十聲者必生我剎中不得是願終不成佛云云先聖云唱佛一聲天魔喪膽名除鬼簿蓮出金池又懺法云自力他力一遲一速欲越海者種樹作船遲也比自力也借船越海速也比佛力也又曰世間稚兒迫於水火高聲大呌則父母聞之急走救援如人臨命終時高聲念佛則佛具神通決定來迎爾是故大聖慈悲勝於父母也衆生生死甚於水火也有人云自心淨土淨土不可生自性彌陀彌陀不可見此言似是而非也彼佛無貪無嗔我亦無貪嗔乎彼佛變地獄作蓮花易於反掌我則以業力常恐自墮於地獄況變作蓮花乎彼佛觀無盡世界如在目前我則隔壁事猶不知況見十方世界如目前乎是故人人性則雖佛而行則衆生論其相用天地懸隔圭峰云設實頓悟終須漸行誠哉是言也然則寄語自性彌陀者豈有天生釋迦自然彌陀耶須自忖量人豈不自知臨命終時生死苦際定得自在否若不如是莫以一時貢高却致永劫沉墮又馬鳴龍樹悉是祖師皆明垂言教深勸往生我何人哉不欲往生又自云西方去此遠夫十方十惡八千八邪此為鈍根説相也又云西方去此不遠即心衆生是佛彌陀此為利根説性也教有權實語有顯密若解行相應者遠近俱通也故祖師門下亦有或喚阿彌陀佛者惠遠或喚主人公者瑞岩聽經有經耳之緣隨喜之福幻軀有盡實行不亡此明智學如食金剛勝施七寶壽師云聞而不信尚結佛種之因學而不成猶益人天之福看經若不向自己上做工夫雖看盡萬藏猶無益也此明愚學如春禽晝啼秋蟲夜鳴密師云識字看經元不證悟銷文釋義唯熾貪嗔邪見學未至於道衒耀見聞徒以口舌辨利相勝者如廁屋塗丹雘別明末世愚學學本修性全習為人是誠何心哉出家人習外典如以刀割泥泥無所用而刀自傷焉門外長者子還入火宅中出家為僧豈細事乎非求安逸也非求溫飽也非求利名也為生死也為斷煩惱也為續佛慧命也為出三界度衆生也可謂衝天大丈夫佛云無常之火燒諸世間又云衆生苦火四面俱焚又云諸煩惱賊常伺殺人道人宜自警悟如救頭燃身有生老病死界有成住壞空心有生住異滅此無常苦火四面俱焚者也謹白參玄人光陰莫虗度貪世浮名枉功勞形營求世利業火加薪貪世浮名者有人詩云鴻飛天末迹留沙人去黃泉名在家營求世利者有人詩云采得百花成蜜後不知辛苦為誰甜枉功勞形者鑿氷雕刻不用之巧也業火加薪者粗弊色香致火之具也名利衲子不如草衣野人唾金輪入雪山千世尊不易之軌則末世羊質虎皮之輩不識廉耻望風隨勢陰媚取寵噫其懲也夫心染世利者阿附權門趨走風塵返取笑於俗人此衲子以羊質證此多行以懲也夫三字結之此三字文出莊子佛云云何賊人假我衣服裨販如來造種種業末法比丘有多般名字或烏鼠僧或啞羊僧或禿居士或地獄滓或被袈裟賊噫其所以以此裨販如來者撥因果排罪福沸騰身口迭起愛憎可謂愍也避僧避俗曰烏鼠舌不説法曰啞羊僧形俗心曰禿居士罪重不遷曰地獄滓賣佛營生曰被袈裟賊以被袈裟賊證此多名以此二字結之此二字文出老子於戲佛子一衣一食莫非農夫之血織女苦道眼未明如何消得傳燈一道人道眼未明故身為木菌以還信施故曰要識披毛戴角底麼即今虗受信施者是有人未飢而食未寒而衣是誠何心哉都不思目前之樂便是身後之苦也智論一道人五粒粟受牛身生償筋骨死還皮肉虗受信施報應如響故曰寧以熱鐵纏身不受信心人衣寧以洋銅灌口不受信心人食寧以鐵罐投身不受信心人房舍等梵網經云不以破戒之身受信心人種種供養乃種種施物菩薩若不發是願則得輕垢罪故曰道人進食如進毒受施如受箭弊厚言甘道人所畏進食如進毒者畏喪其道眼也受施如受箭者畏失其道果也故曰修道之人如一塊磨刀之石張三也來磨李四也來磨磨來磨去別人刀快而自家石漸消然有人更嫌他人不來我石上磨實為可惜如此道人平生所向只在溫飽故古語亦有之曰三途苦未是苦袈裟下失人身始是苦也古人云今生未明心滴水也難消此所以袈裟下失人身也佛子佛子憤之激之此章始起於一於戲終結於一古語中間細繹許多故曰字亦一段文法也咄哉此身九孔常流百千癰疽一片薄皮又云革囊盛糞膿血之聚臭穢可鄙無貪惜之何況百年將養一息背恩上來諸業皆由此身發聲叱咄深有警也此身諸愛根本了之虗妄則諸愛自除如其耽著則起無量過患故於此特明之以開修道之眼也評曰四大無生故一為假四冤四大背恩故一為養四蛇我不了虗妄故為他人也嗔之慢之他人亦不了虗妄故為我也嗔之慢之若二鬼之爭一尸也一尸之為體也一曰泡聚一曰夢聚一曰苦聚一曰糞聚非徒速朽亦甚鄙陋上七孔常流涕唾下二孔常流屎尿故須十二時中潔淨身器以參衆數凡行粗不淨者善神必背去因果經云將不淨手執經卷在佛前涕唾者必當獲廁蟲報文殊經云大小便時狀如木石慎勿語言作聲又勿畫壁書字又勿吐痰入廁中又云登廁不洗淨者不得坐禪狀不得登寶殿律云初入廁時先須彈指三下以警在穢之鬼默誦神呪各七遍初誦入廁呪曰韓韓韓韓韓韓唵狠嚕陀耶莎訶次誦洗淨呪曰韓韓韓韓韓韓韓韓唵賀曩蜜㗚帝莎訶右手執瓶左手用無名指洗之淨水旋旋傾之著實洗淨次誦洗手呪曰韓韓韓韓唵主迦囉韓韓韓野莎訶次誦去穢呪曰韓韓韓韓韓韓唵室利曳婆醯韓韓韓娑嚩賀次誦淨身呪曰韓韓韓韓韓韓韓唵跋折囉惱迦吒娑韓韓嚩賀此五神呪有大威德諸惡鬼神聞必拱手若不如法誦持則雖用七恆河水洗至金剛際亦不得身器清淨又云洗淨須用冷水洗手須用皂角又木屑灰泥亦通若不用灰泥則觸水淋其手背垢穢尚存禮佛誦經必得罪云云此登廁洗淨之法亦是道人日用行實故略引經語并附于此有罪即懺悔發業即慚愧有丈夫氣象又改過自新罪隨心滅懺悔者懺其前愆悔其後過慚愧者慚責於內愧發於外然心本空寂罪業無寄道人宜應端心以質直為本一瓢一衲旅泊無纍佛云心如直絃又云直心是道場若不耽著此身則必旅泊無纍凡夫取境道人取心心境兩忘乃是真法取境者如鹿之趂空花也取心者如猿之捉水月也境心雖殊取病則一也此合論凡夫二乘天地尚空秦日月山河不見漢君臣聲聞宴坐林中被魔王捉菩薩遊戲世間外魔不見聲聞取靜為行故心動心動則鬼見也菩薩性自空寂故無迹無迹則外魔不見此合論二乘菩薩三月懶遊花下路一家愁閉雨中門凡人臨命終時但觀五蘊皆空四大無我真心無相不去不來生時性亦不生死時性亦不去湛然圓寂心境一如但能如是直下頓了不為三世所抅繫便是出世自由人也若見諸佛無心隨去若見地獄無心怖畏但自無心同於法界此即是要節也然則平常是因臨終是果道人須著眼看怕死老年親釋迦如向此時明自己百年光影轉頭非凡人臨命終時若一毫毛凡聖情量不盡思慮未忘向驢胎馬腹裏托質泥犂鑊湯中煮煠乃至依前再為螻蟻蚊虻白雲云設使一毫毛凡聖情念淨盡亦未免入驢胎馬腹中二見星飛散入諸趣烈火茫茫寶劒當門評曰此二節特開宗師無心合道門權遮教中念佛求生門然根器不同志願亦異各各如是兩不相妨願諸道者平常隨分各自勞力最後剎那莫生疑悔禪學者本地風光若未發明則孤峭玄關擬從何透往往斷滅空以為禪無記空以為道一切俱無以為高見此冥然頑空受病幽矣今天下之言禪者多坐在此病向上一關措足無門雲門云光不透脫有兩種病透過法身亦有兩種病須一一透得始得不行芳草路難至落花村宗師亦有多病病在耳目者以眉努目側耳點頭為禪病在口舌者以顛言倒語胡喝亂喝為禪病在手足者以進前退後指東畫西為禪病在心腹者以窮玄究妙超情離見為禪據實而論無非是病殺父母者佛前懺悔謗般若者懺悔無路空中撮影非為妙物外追蹤豈俊機本分宗師全提此句如木人唱拍紅爐點雪亦如石火電光學者實不可擬議也故古人知師恩曰不重先師道德只重先師不為我説破不道不道恐上紙墨箭穿江月影須是射雕人大抵學者先須詳辨宗途昔馬祖一喝也百丈耳聾黃檗吐舌這一喝便是拈花消息亦是達磨初來底面目吁此臨濟宗之淵源識法者懼和聲便打杖子一枝無節目殷勤分付夜行人昔馬祖一喝也百丈得大機黃檗得大用大機者圓應為義大用者直截為義事見傳燈録大凡祖師宗途有五曰臨濟宗曰曹洞宗曰雲門宗曰溈仰宗曰法眼宗臨濟宗本師釋迦佛至三十三世六祖慧能大師下直傳曰南嶽懷讓曰馬祖道一曰百丈懷海曰黃檗希運曰臨濟義玄曰興化存獎曰南院首顒曰風穴延沼曰首山省念曰汾陽善昭曰慈明楚圓曰楊岐方會曰白雲守端曰五祖法演曰圓悟克勤曰徑山宗杲禪師等曹洞宗六祖下傍傳曰青原行思曰石頭希遷曰藥山惟儼曰雲岩曇晟曰洞山良價曰曹山耽章曰雲居道膺禪師等雲門宗馬祖傍傳曰天王道悟曰龍潭崇信曰德山宣鑑曰雪峰義存曰雲門文偃曰雪竇重顯曰天衣義懷禪師等溈仰宗百丈傍傳曰溈山靈祐曰仰山慧寂曰香嚴智間曰南塔光漏曰芭蕉慧清曰霍山景通曰無著文喜禪師等法眼宗雪峰傍傳曰玄沙師備曰地藏桂琛曰法眼文益曰天台德韶曰永明延壽曰龍濟紹修曰南臺守安禪師等臨濟家風赤手單刀殺佛殺祖辨古今於玄要驗龍蛇於主賓操金剛寶釰掃除竹木精靈奪獅子全威震裂狐狸心膽要識臨濟宗麼青天轟霹靂平地起波濤曹洞家風權開五位善接三根橫抽寶釰斬諸見稠林妙協弘通截萬機穿鑿威音那畔滿目煙光空劫已前一壺風月要識曹洞宗麼佛祖未生空劫外正偏不落有無機雲門家風劒鋒有路鐵壁無門掀翻露布葛藤剪却常情見解迅電不及思量裂焰寧容湊泊要識雲門宗麼拄杖子𨁝跳上天盞子裏諸佛説法溈仰家風師資唱和父子一家脅下書字頭角崢嶸室中驗人獅子腰折離四句絶百非一槌粉碎有兩口無一舌九曲珠通要識溈仰宗麼斷橫古路鐵牛眠少室法眼家風言中有響句裡藏鋒髑髏常于世界鼻孔磨觸家風風柯月渚顯露真心翠竹黃花宣明妙法要識法眼宗麼風送斷雲歸嶺去月和流水過橋來別明臨濟宗旨大凡一句中具三玄一玄中具三要一句無文綵即三玄三要有文綵即權實玄照用要三句第一句喪身失命第二句未開口錯第三句糞箕掃三要一要照即大機二要照即大用三要照用同時三玄體中玄三世一念等句中玄徑截言句等玄中玄良久棒喝等四料棟奪人不奪境待下根奪境不奪人待中根人境兩俱奪待上根人境俱不奪待出格人四賓主賓中賓學人無鼻孔有問有答賓中主學人有鼻孔有主有法主中賓師家無鼻孔有問在主中主師家有鼻孔不妨奇特四照用先照後用有人在先用後照有法在照用同時驅耕奪食照用不同時有問有答四大式正利平常本分貢假正利少林面壁類平常禾山打鼓類本分山僧不會類貢假達磨不識類四喝金剛王寶劒一刀揮斷一切情解踞地獅子發言吐氣衆魔腦烈探竿影草探其有無師承鼻孔一喝不作一喝用具上三玄四賓主等八棒觸令返玄接掃從正靠玄復正苦責罰棒順宗旨賞棒有虗實辨棒盲枷瞎棒掃除凡聖正棒此等法非特臨濟宗風上自諸佛下至衆生皆分上事若離此説法皆是妄語臨濟喝德山棒皆徹證無生透頂透底大機大用自在無方全身出沒全身擔荷退守文殊普賢大人境界然據實而論此二師亦不免偷心鬼子凜凜吹毛不犯鋒鋩爍爍寒光珠媚水寥寥雲散月行天大丈夫見佛見祖如冤家若著佛求被佛縛若著祖求被祖縛有求皆苦不如無事佛祖如冤者結上無風起浪也有求皆苦者結上當體便是也不如無事者結上動念即乖也到此坐斷天下人舌頭生死迅輪庶幾停息也扶危定亂如丹霞燒木佛雲門喫狗子老母不見佛皆是摧邪顯正底手段然畢竟如何常憶江南三月裏鷓鴣啼處百花香神光不昧萬古徽猷入此門來莫存知解神光不昧者結上昭昭靈靈也萬古徽猷者結上本不生滅也莫存知解者結上不可守名生解也門者有凡聖出入義如荷澤所謂知之一字衆妙之門也吁起於名狀不得結於莫存知解一篇葛藤一句都破也然始終一解中舉萬行如世典之三義也知解二字佛法之大害故時舉而終之荷澤神會禪師不得為曹溪嫡子者以此也因而頌曰如斯舉唱明宗旨笑殺西來碧眼僧然畢竟如何孤輪獨照江山靜自笑一聲天地驚右編乃曹溪老和尚退隱師翁所著也噫二百年來師法益喪禪教之徒各生異見宗教者唯耽糟粕徒自算沙不知五教之上有直指人心使自悟入之門宗禪者自特天真撥無修證不知頓悟後始即發心修習万行之意禪教混溢沙金罔分圓覺所謂聞説本來成佛謂本無迷悟撥置因果則便成邪見又聞修習無明謂真能生妄失真常性則亦成邪見者是也嗚呼殆哉斯道不傳何若是其甚也綿綿涓涓如一髮引千鈞幾乎落地無從矣賴我師翁住西山一十年鞭牛有暇覽五十本經論語録間有日用中參決要切之語句則輒録之時與室中二三子詢詢然誨之一如牧羊之法過者抑之後者鞭之驅入於大覺之門老婆心得徹困若是其切也奈二三子鈍根也返以法門之高峻為病為師翁愍其迷蒙各就語句下入注而解之編次而繹之鈎鎖連環血脈相通萬藏之要五宗之源極備於此言言見諦句句朝宗向之偏者圓之滯者通之可謂禪教之龜鑑解行之良藥也然師翁常與論這般事雖一言半句如弄劒刃上事恐上紙黑豈欲以此流通方外誇衒己能也哉門人白雲禪子魯願寫之門人碧泉禪德義天挍之門人大禪師淨源門人大禪師大常門人青霞道人法融等稽首再拜曰未曾有也遂與同志六七人傾鉢囊中所儲入梓流通以報師翁訓蒙之恩也大機龍藏汪洋渺若淵海雖言探龍珠采珊瑚者孰從而求之非入海如陸之手段頗不免望涯之嘆然則撮要之功發蒙之惠如山之高若海之深設若碎萬骨粉千命如何報得一毫哉千里之外有見之聞之不驚不疑敬之讀之以為寶玩則真所謂千歲之下一子雲耳時万曆己卯春曹溪宗遂四溟隱峰惟政拜手口訣因為謹跋
